<!DOCTYPE html>
<html lang="pt-br">
<head>

<style>

    *{
        margin: 0px;

        background-color:rgb(0, 0, 0);

    main > p{

        margin-left: 5%;
        display: block;
    }

        transform: rotate(90dg);
    }
</style>

<body>

        </P>
